services:
  postgres:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB must be set by the verification script}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set by the verification script}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER must be set by the verification script}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - postgres-integration

networks:
  postgres-integration:
    internal: true
